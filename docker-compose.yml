version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: stego_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: stego_minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-service:
    build:
      context: ./gateway-service
    container_name: stego_gateway
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MINIO_URL=minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
      - IMAGE_ANALYSIS_URL=http://image-analysis-service:8000
      - DNN_DEFENSE_URL=http://dnn-defense-service:8000
      - NEUTRALIZATION_URL=http://neutralization-service:8000
      - ORCHESTRATION_URL=http://orchestration-service:8000
      - NOTIFICATION_URL=http://notification-service:8000
    depends_on:
      - redis
      - minio

  image-analysis-service:
    build:
      context: ./image-analysis-service
    container_name: stego_image_analysis
    ports:
      - "8001:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MINIO_URL=minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
    depends_on:
      - minio

  dnn-defense-service:
    build:
      context: ./dnn-defense-service
    container_name: stego_dnn_defense
    ports:
      - "8002:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  neutralization-service:
    build:
      context: ./neutralization-service
    container_name: stego_neutralization
    ports:
      - "8003:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MINIO_URL=minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
    depends_on:
      - minio

  orchestration-service:
    build:
      context: ./orchestration-service
    container_name: stego_orchestration
    ports:
      - "8004:8000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MINIO_URL=minio:9000
    depends_on:
      - redis
      - minio

  notification-service:
    build:
      context: ./notification-service
    container_name: stego_notification
    ports:
      - "8005:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

volumes:
  redis_data:
  minio_data:
